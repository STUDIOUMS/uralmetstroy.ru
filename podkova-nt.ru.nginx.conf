# /etc/nginx/sites-available/podkova-nt.ru
# 301 редиректы с podkova-nt.ru → uralmetstroy.ru
# ЭТАП 1: HTTP-only (до получения SSL-сертификата через certbot)

server {
    listen 80;
    server_name podkova-nt.ru www.podkova-nt.ru;

    # ACME challenge для Let's Encrypt (нужен для certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Точные URL → тематические страницы ───────────────────────────────

    location = /ogradki_na_mogilu_kovanye_i_svarnye_optom_i_v_roznicu_kupit {
        return 301 https://uralmetstroy.ru/catalog;
    }
    location = /kovanyie_ogradki_na_mogilu {
        return 301 https://uralmetstroy.ru/catalog;
    }
    location = /ritualnye_kovanye_skamejki_stoliki_lavochki_optom_i_v_roznicu_kupit {
        return 301 https://uralmetstroy.ru/stolik-i-skameyka;
    }
    location = /lavochki_stoliki_skamejki_na_kladbishhe_svarnye_kupit {
        return 301 https://uralmetstroy.ru/stolik-i-skameyka;
    }
    location = /skulpturyi_pamyatniki_iz_mramora_granita_stekloplastika {
        return 301 https://uralmetstroy.ru/metallicheskie-pamyatniki;
    }
    location = /ritualnye-izdeliya {
        return 301 https://uralmetstroy.ru/ritualnye-izdeliya;
    }
    location = /kuznechnyj-dvor {
        return 301 https://uralmetstroy.ru/o-kompanii;
    }
    location = /katalog_elementov {
        return 301 https://uralmetstroy.ru/cena-ogradki;
    }
    location = /kovanie-izdeliya {
        return 301 https://uralmetstroy.ru/catalog;
    }
    location = /kovanyie-elementyi {
        return 301 https://uralmetstroy.ru/catalog;
    }
    location = /dostavka {
        return 301 https://uralmetstroy.ru/dostavka-i-oplata;
    }
    location = /stati {
        return 301 https://uralmetstroy.ru/blog;
    }
    location ^~ /stati/ {
        return 301 https://uralmetstroy.ru/blog;
    }
    location = /kontaktyi {
        return 301 https://uralmetstroy.ru/kontakty;
    }
    location = /obratnaya-svyaz {
        return 301 https://uralmetstroy.ru/kontakty;
    }
    location = /Kovanye-perila-lestnicy-ograzhdenija {
        return 301 https://uralmetstroy.ru/;
    }
    location = /Pechi-dlya-bani-i-doma {
        return 301 https://uralmetstroy.ru/;
    }
    location = /vintovyie-lestnitsyi-perila-ograjdeniya {
        return 301 https://uralmetstroy.ru/;
    }

    # ── Всё остальное → главная ───────────────────────────────────────────
    location / {
        return 301 https://uralmetstroy.ru/;
    }
}
