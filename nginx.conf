# nginx.conf — Подкова-НТ.ру (Next.js SSR)
# Next.js запущен на порту 3000, Nginx — reverse proxy
#
# УСТАНОВКА:
#   sudo cp nginx.conf /etc/nginx/sites-available/uralmetstroy.ru
#   sudo ln -s /etc/nginx/sites-available/uralmetstroy.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name uralmetstroy.ru www.uralmetstroy.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://uralmetstroy.ru$request_uri;
    }
}

# www → non-www
server {
    listen 443 ssl http2;
    server_name www.uralmetstroy.ru;

    ssl_certificate     /etc/letsencrypt/live/uralmetstroy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uralmetstroy.ru/privkey.pem;

    return 301 https://uralmetstroy.ru$request_uri;
}

# Основной HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name uralmetstroy.ru;

    ssl_certificate     /etc/letsencrypt/live/uralmetstroy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uralmetstroy.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    charset utf-8;

    # ── GZIP ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/ld+json image/svg+xml;

    # ── SECURITY HEADERS ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── СТАТИЧЕСКИЕ ФАЙЛЫ Next.js (_next/static) ────────────
    location /_next/static/ {
        alias /var/www/uralmetstroy.ru/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── ПУБЛИЧНЫЕ ФАЙЛЫ (img, favicon и т.д.) ───────────────
    location /img/ {
        alias /var/www/uralmetstroy.ru/public/img/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(ico|png|jpg|jpeg|webp|svg|gif|woff2|woff|ttf)$ {
        root /var/www/uralmetstroy.ru/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @nextjs;
    }

    # ── PROXY → Next.js Node.js ─────────────────────────────
    location / {
        proxy_pass         http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location @nextjs {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── ЗАКРЫТЬ ЛИШНЕЕ ──────────────────────────────────────
    location ~ /\. { deny all; access_log off; }
    location ~* \.(env|log|sh|py|sql)$ { deny all; }

    # ── ЛОГИ ────────────────────────────────────────────────
    access_log /var/log/nginx/uralmetstroy.ru.access.log;
    error_log  /var/log/nginx/uralmetstroy.ru.error.log warn;
}
